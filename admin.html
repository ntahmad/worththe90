<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>WorthThe90 Admin</title>
<style>
:root{--bg:#f6f7fb;--ink:#0f172a;--muted:#64748b;--line:#e5e7eb;--card:#fff;--red:#dc111d;--green:#16a34a;--black:#050b12;--shadow:0 18px 45px rgba(15,23,42,.10)}
*{box-sizing:border-box}body{margin:0;font-family:system-ui,-apple-system,Segoe UI,Roboto,Arial,sans-serif;background:radial-gradient(circle at top left,#fff 0,#f6f7fb 48%,#eef2f7 100%);color:var(--ink)}
header{height:64px;background:linear-gradient(180deg,#080e16,#05080d);color:#fff;border-bottom:1px solid rgba(255,255,255,.08);box-shadow:0 6px 24px rgba(0,0,0,.18)}
.header-inner{max-width:1180px;height:64px;margin:0 auto;padding:0 22px;display:flex;align-items:center;justify-content:space-between;gap:20px}.brand{display:flex;align-items:center;gap:10px}.logo-mark{width:34px;height:34px;border-radius:999px;display:grid;place-items:center;border:2px solid rgba(57,164,20,.85);font-size:18px}.brand h1{margin:0;font-size:27px;letter-spacing:-.06em;line-height:1;white-space:nowrap}.brand h1 span.red{color:var(--red)}.logo-small{color:#39a414;font-size:18px;font-weight:950;margin-right:2px}.pill{border:1px solid rgba(255,255,255,.14);background:rgba(255,255,255,.08);color:#fff;border-radius:999px;padding:9px 13px;font-weight:850}
main{max-width:1180px;margin:0 auto;padding:30px 18px 70px}.hero{margin-bottom:22px}.hero h2{font-size:38px;letter-spacing:-.05em;margin:0 0 6px}.hero p{margin:0;color:var(--muted);font-weight:750}.grid{display:grid;grid-template-columns:360px 1fr;gap:20px;align-items:start}.card{background:rgba(255,255,255,.94);border:1px solid rgba(15,23,42,.08);border-radius:18px;padding:18px;box-shadow:var(--shadow)}.card h3{margin:0 0 14px;font-size:18px}.field{display:grid;gap:7px;margin-bottom:13px}.field label{font-size:13px;color:#334155;font-weight:900}.field input,.field select{width:100%;border:1px solid #cbd5e1;border-radius:12px;padding:12px 13px;font-size:15px;background:#fff;color:#111827}.btn{border:1px solid #cbd5e1;background:#fff;color:#111827;border-radius:999px;padding:11px 15px;font-weight:950;font-size:14px;cursor:pointer}.btn.primary{background:linear-gradient(180deg,#101923,#050b12);color:#fff;border-color:#050b12}.btn.green{background:#16a34a;color:#fff;border-color:#16a34a}.btn.danger{background:#fee2e2;color:#991b1b;border-color:#fecaca}.row{display:flex;gap:10px;align-items:center;flex-wrap:wrap}.status{margin-top:12px;padding:11px 12px;border-radius:12px;background:#f8fafc;border:1px solid #e2e8f0;color:#334155;font-weight:800;display:none}.status.show{display:block}.status.ok{background:#ecfdf5;border-color:#bbf7d0;color:#047857}.status.err{background:#fef2f2;border-color:#fecaca;color:#991b1b}.match-list{display:grid;gap:10px;max-height:520px;overflow:auto}.match-item{border:1px solid #e5e7eb;background:#fff;border-radius:14px;padding:13px;cursor:pointer}.match-item:hover{border-color:#94a3b8}.match-item.active{border-color:#16a34a;box-shadow:0 0 0 3px rgba(22,163,74,.12)}.match-title{font-weight:1000;font-size:16px}.match-meta{margin-top:4px;color:#64748b;font-size:13px;font-weight:750}.video-grid{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:12px}.region-box{border:1px solid #e5e7eb;border-radius:14px;padding:12px;background:#fff}.region-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:8px;font-weight:1000}.small{font-size:12px;color:#64748b;font-weight:750}.hidden{display:none}.empty{padding:24px;border:1px dashed #cbd5e1;border-radius:16px;color:#64748b;font-weight:850;text-align:center;background:rgba(255,255,255,.6)}
@media(max-width:860px){.grid{grid-template-columns:1fr}.hero h2{font-size:30px}.video-grid{grid-template-columns:1fr}.header-inner{padding:0 14px}.pill{display:none}}
</style>
</head>
<body>
<header><div class="header-inner"><div class="brand"><div class="logo-mark">⚽</div><h1><span class="logo-small">is it</span> WorthThe<span class="red">90?</span></h1></div><button class="pill" id="logoutBtn" onclick="logout()" style="display:none">Log out</button></div></header>
<main>
  <section class="hero"><h2>Admin Panel</h2><p>Manage missing highlight links without editing Supabase rows by hand.</p></section>

  <section id="loginCard" class="card" style="max-width:460px">
    <h3>Sign in</h3>
    <div class="field"><label>Email</label><input id="email" type="email" autocomplete="email"></div>
    <div class="field"><label>Password</label><input id="password" type="password" autocomplete="current-password"></div>
    <button class="btn primary" onclick="login()">Sign in</button>
    <div id="loginStatus" class="status"></div>
  </section>

  <section id="adminApp" class="hidden">
    <div class="grid">
      <aside class="card">
        <h3>Search matches</h3>
        <div class="field"><label>Team or competition</label><input id="searchBox" placeholder="Germany, Morocco, Round of 32..." oninput="renderMatches()"></div>
        <div class="row" style="margin-bottom:12px"><button class="btn" onclick="loadMatches()">Refresh</button><span class="small" id="matchCount"></span></div>
        <div id="matchList" class="match-list"></div>
      </aside>

      <section class="card">
        <div id="editorEmpty" class="empty">Select a match to edit regional video IDs.</div>
        <div id="editor" class="hidden">
          <h3 id="editorTitle"></h3>
          <div class="match-meta" id="editorMeta" style="margin-bottom:16px"></div>
          <div class="video-grid" id="videoGrid"></div>
          <div class="row" style="margin-top:16px">
            <button class="btn green" onclick="saveVideos()">Save changes</button>
            <button class="btn" onclick="fillFromClipboardNote()">Paste full YouTube links or video IDs</button>
          </div>
          <div id="saveStatus" class="status"></div>
        </div>
      </section>
    </div>
  </section>
</main>
<script>
const SUPABASE_URL = "https://mccocwpxmxzdoabspimu.supabase.co";
const SUPABASE_KEY = "sb_publishable_9M9IHFHShpkaoSlCmQa8nw_TQL8Au7M";
const SUPABASE_HEADERS = { apikey: SUPABASE_KEY, Authorization: `Bearer ${SUPABASE_KEY}`, "Content-Type":"application/json" };
const REGION_FIELDS = [
  { key:"us_video_id", label:"US", source:"FOX Sports" },
  { key:"gb_video_id", label:"GB", source:"BBC Football" },
  { key:"se_video_id", label:"SE", source:"SVT" },
  { key:"nl_video_id", label:"NL", source:"NOS Sport" },
  { key:"au_video_id", label:"AU", source:"SBS Sport" },
  { key:"ca_video_id", label:"CA", source:"TSN" },
  { key:"pk_video_id", label:"PK", source:"tapmad" },
  { key:"fallback_video_id", label:"Fallback", source:"Fallback" }
];
let session = null;
let matches = [];
let selected = null;
function showStatus(id, msg, type="") { const el=document.getElementById(id); el.textContent=msg; el.className=`status show ${type}`; }
async function api(path, options={}){
  const headers={...SUPABASE_HEADERS, ...(options.headers||{})};
  const res=await fetch(`${SUPABASE_URL}${path}`, {...options, headers});
  const text=await res.text();
  if(!res.ok) throw new Error(text || `HTTP ${res.status}`);
  return text ? JSON.parse(text) : null;
}
async function login(){
  try{
    const email=document.getElementById("email").value.trim();
    const password=document.getElementById("password").value;
    const data=await api("/auth/v1/token?grant_type=password", {method:"POST", body:JSON.stringify({email,password})});
    session=data;
    localStorage.setItem("w90_admin_session", JSON.stringify(data));
    await bootAdmin();
  }catch(e){ showStatus("loginStatus", "Login failed. Check email/password.", "err"); console.error(e); }
}
async function logout(){ localStorage.removeItem("w90_admin_session"); session=null; selected=null; document.getElementById("adminApp").classList.add("hidden"); document.getElementById("loginCard").style.display="block"; document.getElementById("logoutBtn").style.display="none"; }
function authHeader(){ return session?.access_token ? { Authorization:`Bearer ${session.access_token}` } : {}; }
async function bootAdmin(){ document.getElementById("loginCard").style.display="none"; document.getElementById("adminApp").classList.remove("hidden"); document.getElementById("logoutBtn").style.display="inline-block"; await loadMatches(); }
async function loadMatches(){
  const select="id,slug,home_team,away_team,competition,kickoff_utc,us_video_id,gb_video_id,se_video_id,nl_video_id,au_video_id,ca_video_id,pk_video_id,fallback_video_id";
  matches=await api(`/rest/v1/matches?select=${select}&order=kickoff_utc.asc`);
  document.getElementById("matchCount").textContent=`${matches.length} matches`;
  renderMatches();
}
function renderMatches(){
  const q=document.getElementById("searchBox").value.trim().toLowerCase();
  const filtered=matches.filter(m=>!q || `${m.home_team} ${m.away_team} ${m.competition}`.toLowerCase().includes(q));
  document.getElementById("matchList").innerHTML=filtered.map(m=>`<div class="match-item ${selected?.id===m.id?'active':''}" onclick="selectMatch('${m.id}')"><div class="match-title">${escapeHtml(m.home_team)} vs ${escapeHtml(m.away_team)}</div><div class="match-meta">${escapeHtml(m.competition||'')} · ${new Date(m.kickoff_utc).toLocaleString()}</div></div>`).join("") || `<div class="empty">No matches found.</div>`;
}
function selectMatch(id){ selected=matches.find(m=>String(m.id)===String(id)); renderMatches(); renderEditor(); }
function renderEditor(){
  if(!selected){return;}
  document.getElementById("editorEmpty").classList.add("hidden");
  document.getElementById("editor").classList.remove("hidden");
  document.getElementById("editorTitle").textContent=`${selected.home_team} vs ${selected.away_team}`;
  document.getElementById("editorMeta").textContent=`${selected.competition || ''} · ${new Date(selected.kickoff_utc).toLocaleString()} · ${selected.slug}`;
  document.getElementById("videoGrid").innerHTML=REGION_FIELDS.map(r=>`<div class="region-box"><div class="region-head"><span>${r.label}</span><span class="small">${r.source}</span></div><input id="field-${r.key}" placeholder="YouTube URL or video ID" value="${escapeAttr(selected[r.key]||'')}"></div>`).join("");
  document.getElementById("saveStatus").className="status";
}
function extractVideoId(input){
  const s=(input||"").trim();
  if(!s) return "";
  const patterns=[/[?&]v=([a-zA-Z0-9_-]{11})/,/youtu\.be\/([a-zA-Z0-9_-]{11})/,/youtube\.com\/embed\/([a-zA-Z0-9_-]{11})/,/shorts\/([a-zA-Z0-9_-]{11})/];
  for(const p of patterns){ const m=s.match(p); if(m) return m[1]; }
  const bare=s.match(/^[a-zA-Z0-9_-]{11}$/); return bare ? s : s;
}
async function saveVideos(){
  if(!selected) return;
  try{
    const videos={};
    for(const r of REGION_FIELDS){ videos[r.key]=extractVideoId(document.getElementById(`field-${r.key}`).value); }
    const res=await fetch(`${SUPABASE_URL}/functions/v1/manual-video-override`, {method:"POST", headers:{"Content-Type":"application/json", ...authHeader()}, body:JSON.stringify({match_id:selected.id, videos})});
    const json=await res.json().catch(()=>({}));
    if(!res.ok || !json.ok) throw new Error(json.error || `Save failed (${res.status})`);
    showStatus("saveStatus", "Saved successfully.", "ok");
    await loadMatches();
    selected=matches.find(m=>String(m.id)===String(json.match_id || selected.id));
    renderEditor();
  }catch(e){ showStatus("saveStatus", e.message || "Save failed.", "err"); console.error(e); }
}
function fillFromClipboardNote(){ showStatus("saveStatus", "Paste a full YouTube URL or 11-character video ID into any box, then click Save changes.", ""); }
function escapeHtml(s){return String(s||"").replace(/[&<>"]/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;","\"":"&quot;"}[c]))}
function escapeAttr(s){return escapeHtml(s).replace(/'/g,"&#39;")}
(function restore(){ try{ const saved=JSON.parse(localStorage.getItem("w90_admin_session")||"null"); if(saved?.access_token){ session=saved; bootAdmin(); } }catch{} })();
</script>
</body>
</html>
